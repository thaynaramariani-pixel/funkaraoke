<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎤 KaraokêTV</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-pink: #ff2d78;
    --neon-cyan: #00f5ff;
    --neon-yellow: #ffe600;
    --neon-purple: #bf00ff;
    --dark: #070714;
    --dark2: #0d0d2b;
    --glass: rgba(255,255,255,0.05);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    font-family: 'Nunito', sans-serif;
    color: #fff;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* BACKGROUND ANIMATED */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 20% 50%, #1a003a 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, #00163a 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, #1a001a 0%, transparent 60%),
                var(--dark);
  }
  .bg::after {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Ccircle cx='30' cy='30' r='1'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* SCREENS */
  .screen { position: relative; z-index: 10; width: 100%; height: 100vh; display: none; flex-direction: column; }
  .screen.active { display: flex; }

  /* === MENU SCREEN === */
  #menu {
    align-items: center;
    justify-content: flex-start;
    padding: 12px 14px;
    gap: 0;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 8vw, 5rem);
    letter-spacing: 6px;
    text-align: center;
    line-height: 1;
    margin-bottom: 2px;
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(255,45,120,0.5));
    animation: logoPulse 3s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%,100% { filter: drop-shadow(0 0 20px rgba(255,45,120,0.5)); }
    50% { filter: drop-shadow(0 0 40px rgba(0,245,255,0.7)); }
  }

  .subtitle {
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* Search */
  .search-wrap {
    width: 100%;
    max-width: 700px;
    margin: 0 auto 10px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    padding: 14px 50px 14px 20px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    color: #fff;
    font-size: 1rem;
    font-family: 'Nunito', sans-serif;
    outline: none;
    transition: all 0.3s;
  }
  .search-wrap input:focus {
    border-color: var(--neon-cyan);
    background: rgba(0,245,255,0.07);
    box-shadow: 0 0 20px rgba(0,245,255,0.2);
  }
  .search-wrap .search-icon {
    position: absolute; right: 18px; top: 50%;
    transform: translateY(-50%);
    font-size: 1.2rem; opacity: 0.5;
  }

  /* Category tabs */
  .cats {
    display: flex; gap: 6px;
    max-width: 700px; margin: 0 auto 10px;
    flex-wrap: wrap; justify-content: center;
  }
  .cat-btn {
    padding: 5px 13px;
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: rgba(255,255,255,0.6);
    font-size: 0.75rem;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.2s;
  }
  .cat-btn.active, .cat-btn:hover {
    background: var(--neon-pink);
    border-color: var(--neon-pink);
    color: #fff;
  }

  /* Song grid */
  .song-grid {
    flex: 1;
    overflow-y: auto;
    max-width: 700px;
    margin: 0 auto;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-bottom: 10px;
  }
  .song-grid::-webkit-scrollbar { width: 4px; }
  .song-grid::-webkit-scrollbar-thumb { background: var(--neon-pink); border-radius: 4px; }

  .song-card {
    background: var(--glass);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
  }
  .song-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .song-card:hover::before, .song-card:active::before { opacity: 0.15; }
  .song-card:hover, .song-card:active {
    border-color: var(--neon-pink);
    box-shadow: 0 6px 20px rgba(255,45,120,0.3);
  }
  .song-card > * { position: relative; z-index: 1; }

  .song-emoji { font-size: 1.8rem; flex-shrink: 0; }
  .song-info { flex: 1; min-width: 0; }
  .song-title { font-weight: 900; font-size: 0.95rem; line-height: 1.2; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-artist { font-size: 0.75rem; color: rgba(255,255,255,0.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-meta { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .song-tag {
    font-size: 0.6rem;
    padding: 2px 7px;
    border-radius: 50px;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
    flex-shrink: 0;
  }
  .song-play-icon { font-size: 1.2rem; flex-shrink: 0; opacity: 0.4; }

  /* === GAME SCREEN === */
  #game {
    display: none;
    flex-direction: column;
    padding: 16px;
  }

  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .now-playing {
    display: flex; align-items: center; gap: 10px;
  }
  .vinyl {
    width: 44px; height: 44px;
    background: conic-gradient(#1a1a1a 0deg, #333 60deg, #1a1a1a 120deg, #333 180deg, #1a1a1a 240deg, #333 300deg, #1a1a1a 360deg);
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.2);
    animation: spin 3s linear infinite paused;
    position: relative;
    flex-shrink: 0;
  }
  .vinyl::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    background: var(--neon-pink);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    box-shadow: 0 0 8px var(--neon-pink);
  }
  .vinyl.playing { animation-play-state: running; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .song-info-game h2 { font-size: 1rem; font-weight: 900; }
  .song-info-game p { font-size: 0.75rem; color: rgba(255,255,255,0.5); }

  /* Score */
  .score-panel {
    display: flex; align-items: center; gap: 12px;
  }
  .score-box {
    text-align: center;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 6px 14px;
  }
  .score-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--neon-yellow);
    line-height: 1;
    text-shadow: 0 0 20px rgba(255,230,0,0.7);
    transition: all 0.3s;
  }
  .score-label { font-size: 0.6rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }

  /* Stars */
  .stars { font-size: 1.2rem; }

  /* Progress bar */
  .progress-track {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
    border-radius: 4px;
    width: 0%;
    transition: width 0.5s linear;
    box-shadow: 0 0 10px var(--neon-cyan);
  }

  /* Lyrics area */
  .lyrics-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .lyric-prev {
    font-size: clamp(0.8rem, 2vw, 1rem);
    color: rgba(255,255,255,0.2);
    margin-bottom: 16px;
    font-weight: 700;
    transition: all 0.5s;
  }

  .lyric-current {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.8rem, 5vw, 3.5rem);
    letter-spacing: 2px;
    line-height: 1.2;
    margin-bottom: 16px;
    position: relative;
  }

  .lyric-words { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
  .lyric-word {
    position: relative;
    color: rgba(255,255,255,0.3);
    transition: color 0.1s;
  }
  .lyric-word.sung {
    color: var(--neon-yellow);
    text-shadow: 0 0 20px rgba(255,230,0,0.8);
  }
  .lyric-word.active {
    color: #fff;
    text-shadow: 0 0 30px rgba(255,255,255,0.9);
  }

  .lyric-next {
    font-size: clamp(0.8rem, 2vw, 1.1rem);
    color: rgba(255,255,255,0.25);
    font-weight: 700;
    transition: all 0.5s;
  }

  /* Mic visualizer */
  .mic-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 12px;
  }
  .mic-btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
    color: #fff;
    font-size: 1.4rem;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(255,45,120,0.5);
  }
  .mic-btn:hover { transform: scale(1.1); }
  .mic-btn.muted { background: rgba(255,255,255,0.1); box-shadow: none; }

  .bars {
    display: flex; align-items: flex-end; gap: 3px;
    height: 36px;
  }
  .bar {
    width: 4px;
    background: linear-gradient(to top, var(--neon-pink), var(--neon-cyan));
    border-radius: 2px;
    animation: barAnim 0.6s ease-in-out infinite alternate;
    min-height: 4px;
  }
  .bar:nth-child(1) { animation-delay: 0s; }
  .bar:nth-child(2) { animation-delay: 0.1s; }
  .bar:nth-child(3) { animation-delay: 0.2s; }
  .bar:nth-child(4) { animation-delay: 0.15s; }
  .bar:nth-child(5) { animation-delay: 0.05s; }
  .bar:nth-child(6) { animation-delay: 0.25s; }
  .bar:nth-child(7) { animation-delay: 0.1s; }
  .bar:nth-child(8) { animation-delay: 0.3s; }
  @keyframes barAnim {
    from { height: 4px; }
    to { height: var(--h, 20px); }
  }
  .bars.paused .bar { animation-play-state: paused; height: 4px; }

  /* Controls */
  .game-controls {
    display: flex; gap: 10px; justify-content: center;
    margin-top: 10px;
  }
  .ctrl-btn {
    padding: 10px 22px;
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.07);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.15); }
  .ctrl-btn.primary {
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
    border-color: transparent;
    box-shadow: 0 4px 20px rgba(255,45,120,0.4);
  }

  /* Note feedback */
  .note-feedback {
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    pointer-events: none;
    animation: notePop 1s forwards;
    z-index: 100;
  }
  @keyframes notePop {
    0% { opacity: 1; transform: translateY(0) scale(0.5); }
    50% { opacity: 1; transform: translateY(-40px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-80px) scale(1); }
  }

  /* === RESULT SCREEN === */
  #result {
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .result-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 40px;
    text-align: center;
    max-width: 400px;
    width: 90%;
  }

  .result-grade {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 8rem;
    line-height: 1;
    background: linear-gradient(135deg, var(--neon-yellow), var(--neon-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 30px rgba(255,230,0,0.5));
    animation: gradeIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }
  @keyframes gradeIn {
    from { transform: scale(0) rotate(-20deg); opacity: 0; }
    to { transform: scale(1) rotate(0); opacity: 1; }
  }

  .result-stars { font-size: 2.5rem; margin: 10px 0; }
  .result-score { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--neon-cyan); }
  .result-msg { color: rgba(255,255,255,0.6); margin: 10px 0 20px; }

  .result-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  /* Fireworks */
  .firework {
    position: fixed;
    width: 6px; height: 6px;
    border-radius: 50%;
    animation: fw 1s ease-out forwards;
    pointer-events: none;
  }
  @keyframes fw {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  /* Countdown */
  .countdown {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    background: rgba(7,7,20,0.95);
  }
  .countdown-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15rem;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: cdPop 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes cdPop {
    0% { transform: scale(2); opacity: 0; }
    50% { transform: scale(0.9); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Pitch indicator */
  .pitch-bar-wrap {
    width: 12px;
    height: 120px;
    background: rgba(255,255,255,0.05);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .pitch-fill {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, var(--neon-pink), var(--neon-cyan));
    transition: height 0.1s;
    border-radius: 6px;
  }

  /* Sync controls */
  .sync-controls {
    text-align: center;
    padding: 6px 0 2px;
  }
  .sync-btn {
    padding: 5px 10px;
    border-radius: 50px;
    border: 1px solid rgba(0,245,255,0.3);
    background: rgba(0,245,255,0.08);
    color: var(--neon-cyan);
    font-size: 0.72rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sync-btn:hover, .sync-btn:active {
    background: rgba(0,245,255,0.2);
    border-color: var(--neon-cyan);
  }

  /* Timer ring */
  .timer-ring {
    position: relative;
    width: 48px; height: 48px;
  }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring circle { fill: none; stroke-width: 3; }
  .ring-bg { stroke: rgba(255,255,255,0.1); }
  .ring-fill { stroke: var(--neon-cyan); stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  .timer-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    color: var(--neon-cyan);
  }
</style>
</head>
<body>

<div class="bg"></div>

<!-- MENU SCREEN -->
<div id="menu" class="screen active">
  <div class="logo">🎤 KaraokêTV</div>
  <div class="subtitle">Escolha sua música e brilhe!</div>

  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Buscar música ou artista..." oninput="filterSongs()">
    <span class="search-icon">🔍</span>
  </div>

  <div class="cats">
    <button class="cat-btn active" onclick="filterAll(this)">🎵 Todas</button>
    <button class="cat-btn" onclick="filterLang('pt', this)">🇧🇷 Português</button>
    <button class="cat-btn" onclick="filterLang('en', this)">🇺🇸 English</button>
    <button class="cat-btn" onclick="filterLang('es', this)">🇪🇸 Español</button>
    <button class="cat-btn" onclick="filterCat('pop', this)">💃 Pop</button>
    <button class="cat-btn" onclick="filterCat('rock', this)">🎸 Rock</button>
    <button class="cat-btn" onclick="filterCat('rb', this)">🔥 R&amp;B</button>
    <button class="cat-btn" onclick="filterCat('sertanejo', this)">🤠 Sertanejo</button>
    <button class="cat-btn" onclick="filterCat('funk', this)">🎺 Funk</button>
  </div>

  <div class="song-grid" id="songGrid"></div>
</div>

<!-- GAME SCREEN -->
<div id="game" class="screen">
  <div class="game-header">
    <div class="now-playing">
      <div class="vinyl" id="vinyl"></div>
      <div class="song-info-game">
        <h2 id="gameSongTitle">–</h2>
        <p id="gameSongArtist">–</p>
      </div>
    </div>

    <div class="score-panel">
      <div class="pitch-bar-wrap">
        <div class="pitch-fill" id="pitchFill" style="height:30%"></div>
      </div>
      <div>
        <div class="score-box">
          <div class="score-val" id="scoreVal">0</div>
          <div class="score-label">Pontos</div>
        </div>
        <div class="stars" id="starsDisplay">⭐⭐⭐</div>
      </div>
      <div class="timer-ring">
        <svg width="48" height="48">
          <circle class="ring-bg" cx="24" cy="24" r="20"/>
          <circle class="ring-fill" id="timerRing" cx="24" cy="24" r="20" stroke-dasharray="125.6" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-text" id="timerText">–</div>
      </div>
    </div>
  </div>

  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="lyrics-stage" id="lyricsStage">
    <div class="lyric-prev" id="lyricPrev"></div>
    <div class="lyric-current">
      <div class="lyric-words" id="lyricCurrent"></div>
    </div>
    <div class="lyric-next" id="lyricNext"></div>
  </div>

  <div class="mic-area">
    <div class="pitch-bar-wrap" style="width:8px; height:48px;">
      <div class="pitch-fill" id="pitchFill2" style="height:40%"></div>
    </div>
    <div class="bars" id="bars">
      <div class="bar" style="--h:28px"></div>
      <div class="bar" style="--h:18px"></div>
      <div class="bar" style="--h:35px"></div>
      <div class="bar" style="--h:22px"></div>
      <div class="bar" style="--h:30px"></div>
      <div class="bar" style="--h:15px"></div>
      <div class="bar" style="--h:25px"></div>
      <div class="bar" style="--h:20px"></div>
    </div>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  </div>

  <div class="game-controls">
    <button class="ctrl-btn" onclick="goToMenu()">← Voltar</button>
    <button class="ctrl-btn primary" id="playPauseBtn" onclick="togglePlay()">▶ Iniciar</button>
    <button class="ctrl-btn" onclick="restartSong()">↺ Reiniciar</button>
  </div>

  <div class="sync-controls">
    <span style="font-size:0.7rem;color:rgba(255,255,255,0.4);letter-spacing:1px;text-transform:uppercase;">Sincronizar letra</span>
    <div style="display:flex;gap:8px;align-items:center;margin-top:4px;">
      <button class="sync-btn" onclick="adjustSync(-2)">⏪ -2s</button>
      <button class="sync-btn" onclick="adjustSync(-1)">◀ -1s</button>
      <span id="syncVal" style="font-size:0.75rem;color:var(--neon-cyan);min-width:40px;text-align:center;">0s</span>
      <button class="sync-btn" onclick="adjustSync(1)">+1s ▶</button>
      <button class="sync-btn" onclick="adjustSync(2)">+2s ⏩</button>
    </div>
  </div>
</div>

<!-- YouTube Player (hidden, audio only) -->
<div id="ytWrapper" style="position:fixed;bottom:0;right:0;width:1px;height:1px;opacity:0;pointer-events:none;overflow:hidden;">
  <div id="ytPlayer"></div>
</div>

<!-- RESULT SCREEN -->
<div id="result" class="screen">

function adjustSync(delta) {
  syncOffset += delta;
  document.getElementById('syncVal').textContent = (syncOffset > 0 ? '+' : '') + syncOffset + 's';
  // Seek the YouTube video by delta seconds
  if (ytReady && ytPlayer && ytPlayer.getCurrentTime) {
    try {
      const current = ytPlayer.getCurrentTime();
      ytPlayer.seekTo(Math.max(0, current - delta), true);
    } catch(e) {}
  }
}


let ytPlayer = null;
let ytReady = false;

// Load YouTube IFrame API
const ytScript = document.createElement('script');
ytScript.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(ytScript);

function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('ytPlayer', {
    height: '1', width: '1',
    playerVars: { autoplay: 0, controls: 0, disablekb: 1, fs: 0, rel: 0 },
    events: {
      onReady: () => { ytReady = true; },
      onStateChange: (e) => {
        // If video ends naturally, sync our timer
        if (e.data === YT.PlayerState.ENDED && isPlaying) endGame();
      }
    }
  });
}

function ytLoad(videoId, startSeconds) {
  if (!ytReady || !ytPlayer) return;
  ytPlayer.loadVideoById({ videoId, startSeconds: startSeconds || 0 });
  ytPlayer.pauseVideo();
}

function ytPlay() {
  if (!ytReady || !ytPlayer) return;
  try { ytPlayer.playVideo(); } catch(e) {}
}

function ytPause() {
  if (!ytReady || !ytPlayer) return;
  try { ytPlayer.pauseVideo(); } catch(e) {}
}

function ytStop() {
  if (!ytReady || !ytPlayer) return;
  try { ytPlayer.stopVideo(); } catch(e) {}
}


let audioCtx = null;
let analyser = null;
let micStream = null;
let micSource = null;
let animFrameId = null;
let micVolume = 0;
let micAvailable = false;

async function startMic() {
  // Check if getUserMedia is supported
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showMicMsg('🎤 Microfone não suportado neste dispositivo — usando simulação');
    startPitchSim();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    micStream = stream;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    micSource = audioCtx.createMediaStreamSource(stream);
    micSource.connect(analyser);
    micAvailable = true;
    isMicOn = true;
    updateMicVisuals();
    document.getElementById('micBtn').textContent = '🎤';
    document.getElementById('micBtn').classList.remove('muted');
    hideMicMsg();
  } catch (e) {
    micAvailable = false;
    isMicOn = false;
    document.getElementById('micBtn').textContent = '🔇';
    document.getElementById('micBtn').classList.add('muted');
    if (e.name === 'NotAllowedError') {
      showMicMsg('🚫 Permissão de microfone negada — cante mesmo assim, a pontuação é automática!');
    } else {
      showMicMsg('🎤 Microfone indisponível — pontuação automática ativada!');
    }
    startPitchSim();
  }
}

function showMicMsg(msg) {
  let el = document.getElementById('micMsg');
  if (!el) {
    el = document.createElement('div');
    el.id = 'micMsg';
    el.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.8);font-size:0.75rem;padding:8px 16px;border-radius:50px;z-index:999;text-align:center;max-width:90vw;';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(hideMicMsg, 5000);
}
function hideMicMsg() {
  const el = document.getElementById('micMsg');
  if (el) el.style.display = 'none';
}

function updateMicVisuals() {
  if (!analyser) return;
  const dataArray = new Uint8Array(analyser.frequencyBinCount);

  function loop() {
    animFrameId = requestAnimationFrame(loop);
    analyser.getByteFrequencyData(dataArray);

    // Calculate volume (RMS)
    let sum = 0;
    for (let i = 0; i < dataArray.length; i++) sum += dataArray[i] * dataArray[i];
    const rms = Math.sqrt(sum / dataArray.length);
    micVolume = Math.min(100, (rms / 128) * 100);

    // Update pitch bars
    const pct = micVolume;
    document.getElementById('pitchFill').style.height = pct + '%';
    document.getElementById('pitchFill2').style.height = pct + '%';

    // Update visualizer bars with real frequency data
    const bars = document.querySelectorAll('#bars .bar');
    const step = Math.floor(dataArray.length / bars.length);
    bars.forEach((bar, i) => {
      const val = dataArray[i * step] || 0;
      const h = Math.max(4, (val / 255) * 48);
      bar.style.height = h + 'px';
      bar.style.animation = 'none'; // disable CSS anim, use real data
    });

    // Score based on volume when playing
    if (isPlaying && isMicOn && micVolume > 15) {
      // Bonus points for singing (detected by volume)
    }
  }
  loop();
}

function stopMic() {
  if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  analyser = null;
  micSource = null;
  micVolume = 0;
  document.getElementById('pitchFill').style.height = '5%';
  document.getElementById('pitchFill2').style.height = '5%';
  // Reset bars
  document.querySelectorAll('#bars .bar').forEach(b => {
    b.style.height = '';
    b.style.animation = '';
  });
}

// ============ MENU ============
function renderSongs(songs) {
  const grid = document.getElementById('songGrid');
  if (songs.length === 0) {
    grid.innerHTML = '<div style="color:rgba(255,255,255,0.3);text-align:center;padding:40px;">Nenhuma música encontrada 🎵</div>';
    return;
  }
  const langFlag = { en: '🇺🇸', pt: '🇧🇷', es: '🇪🇸' };
  const langLabel = { en: 'English', pt: 'Português', es: 'Español' };
  grid.innerHTML = songs.map(s => `
    <div class="song-card" onclick="selectSong(${s.id})">
      <span class="song-emoji">${s.emoji}</span>
      <div class="song-info">
        <div class="song-title">${s.title}</div>
        <div class="song-artist">${s.artist}</div>
        <div class="song-meta">
          <span class="song-tag">${langFlag[s.lang] || ''} ${langLabel[s.lang] || ''}</span>
          <span class="song-tag">${s.cat}</span>
          <span class="song-tag">${s.decade}</span>
        </div>
      </div>
      <span class="song-play-icon">▶</span>
    </div>
  `).join('');
}

let currentDecade = null;
let currentLang = null;

function filterAll(btn) {
  currentCat = 'all';
  currentDecade = null;
  currentLang = null;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function filterCat(cat, btn) {
  currentCat = cat;
  currentDecade = null;
  currentLang = null;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function filterLang(lang, btn) {
  currentLang = lang;
  currentCat = 'all';
  currentDecade = null;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function filterDecade(decade, btn) {
  currentDecade = decade;
  currentCat = 'all';
  currentLang = null;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function filterSongs() { applyFilters(); }

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let songs = SONGS;
  if (currentLang) songs = songs.filter(s => s.lang === currentLang);
  else if (currentDecade) songs = songs.filter(s => s.decade === currentDecade);
  else if (currentCat !== 'all') songs = songs.filter(s => s.cat === currentCat);
  if (q) songs = songs.filter(s => s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q));
  renderSongs(songs);
}

// ============ SONG SELECT ============
function selectSong(id) {
  currentSong = SONGS.find(s => s.id === id);
  syncOffset = 0;
  resetGame();
  showScreen('game');
  document.getElementById('gameSongTitle').textContent = currentSong.title;
  document.getElementById('gameSongArtist').textContent = currentSong.artist;
  document.getElementById('syncVal').textContent = '0s';
  renderLyric();
  // Pre-load the YouTube video
  if (currentSong.ytId) ytLoad(currentSong.ytId, currentSong.ytStart || 0);
}

// ============ GAME ============
function resetGame() {
  score = 0;
  currentLyricIdx = 0;
  wordIdx = 0;
  elapsed = 0;
  isPlaying = false;
  document.getElementById('scoreVal').textContent = '0';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('playPauseBtn').textContent = '▶ Iniciar';
  document.getElementById('vinyl').classList.remove('playing');
  document.getElementById('bars').classList.add('paused');
  updateStars();
  updateTimerRing(currentSong ? currentSong.duration : 60, 0);
  if (gameTimer) { clearInterval(gameTimer); gameTimer = null; }
  ytStop();
}

    startCountdown(async () => {
      isPlaying = true;
      document.getElementById('playPauseBtn').textContent = '⏸ Pausar';
      document.getElementById('vinyl').classList.add('playing');
      document.getElementById('bars').classList.remove('paused');
      ytPlay(); // 🎵 Play real music!
      if (!micStream) await startMic();
      gameTimer = setInterval(tick, 250);
    });
  } else {
    isPlaying = false;
    document.getElementById('playPauseBtn').textContent = '▶ Continuar';
    document.getElementById('vinyl').classList.remove('playing');
    document.getElementById('bars').classList.add('paused');
    ytPause();
    if (gameTimer) { clearInterval(gameTimer); gameTimer = null; }
  }
}

function tick() {
  // Use YouTube's real current time so lyrics always stay in sync
  let ytTime = 0;
  try {
    if (ytReady && ytPlayer && ytPlayer.getCurrentTime) {
      ytTime = ytPlayer.getCurrentTime() - (currentSong.ytStart || 0);
    } else {
      elapsed += 0.5;
      ytTime = elapsed;
    }
  } catch(e) {
    elapsed += 0.5;
    ytTime = elapsed;
  }
  elapsed = ytTime + syncOffset;

  const dur = currentSong.duration;
  document.getElementById('progressFill').style.width = Math.min(100, (elapsed / dur * 100)) + '%';
  updateTimerRing(dur, elapsed);

  // Advance lyrics
  const lyrics = currentSong.lyrics;
  if (currentLyricIdx < lyrics.length - 1) {
    if (elapsed >= lyrics[currentLyricIdx + 1].time) {
      currentLyricIdx++;
      wordIdx = 0;
      renderLyric();
    } else {
      // Advance words within current line
      const words = lyrics[currentLyricIdx].line.split(' ');
      const timeInLine = elapsed - lyrics[currentLyricIdx].time;
      const nextTime = lyrics[currentLyricIdx + 1].time;
      const lineDur = nextTime - lyrics[currentLyricIdx].time;
      const newWordIdx = Math.min(words.length - 1, Math.floor((timeInLine / lineDur) * words.length));
      if (newWordIdx !== wordIdx) {
        wordIdx = newWordIdx;
        updateWordHighlight();
        addScore(Math.floor(Math.random() * 80) + 40);
      }
    }
  }

  if (elapsed >= dur) {
    endGame();
  }
}

function renderLyric() {
  const lyrics = currentSong.lyrics;
  const curr = lyrics[currentLyricIdx];
  const prev = currentLyricIdx > 0 ? lyrics[currentLyricIdx - 1].line : '';

  document.getElementById('lyricPrev').textContent = prev;
  document.getElementById('lyricNext').textContent = curr.next;

  const words = curr.line.split(' ');
  document.getElementById('lyricCurrent').innerHTML = words
    .map((w, i) => `<span class="lyric-word" id="word-${i}">${w}</span>`)
    .join('');
  wordIdx = 0;
}

function updateWordHighlight() {
  const words = currentSong.lyrics[currentLyricIdx].line.split(' ');
  words.forEach((_, i) => {
    const el = document.getElementById('word-' + i);
    if (!el) return;
    if (i < wordIdx) el.className = 'lyric-word sung';
    else if (i === wordIdx) el.className = 'lyric-word active';
    else el.className = 'lyric-word';
  });
}

function addScore(pts) {
  // Bonus if mic is active and user is singing
  let bonus = 1;
  if (isMicOn && micVolume > 20) bonus = 1 + (micVolume / 100) * 0.8;
  score += Math.floor(pts * bonus);
  document.getElementById('scoreVal').textContent = score;
  updateStars();
  if (Math.random() > 0.7) showNoteFeedback();
}

function updateStars() {
  const pct = score / 3000;
  let stars = '⭐';
  if (pct > 0.2) stars = '⭐⭐';
  if (pct > 0.4) stars = '⭐⭐⭐';
  if (pct > 0.6) stars = '⭐⭐⭐⭐';
  if (pct > 0.8) stars = '⭐⭐⭐⭐⭐';
  document.getElementById('starsDisplay').textContent = stars;
}

function showNoteFeedback() {
  const words = ['PERFEITO!', 'INCRÍVEL!', 'SHOW!', '🔥', 'ARRASOU!', 'NOTA 10!'];
  const colors = ['#ffe600', '#ff2d78', '#00f5ff', '#bf00ff', '#ff6b35'];
  const el = document.createElement('div');
  el.className = 'note-feedback';
  el.textContent = words[Math.floor(Math.random() * words.length)];
  el.style.color = colors[Math.floor(Math.random() * colors.length)];
  el.style.left = (20 + Math.random() * 60) + '%';
  el.style.top = (20 + Math.random() * 40) + '%';
  document.getElementById('lyricsStage').appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// Fallback pitch simulation (when mic not available)
function startPitchSim() {
  pitchInterval = setInterval(() => {
    const h = 20 + Math.random() * 75;
    document.getElementById('pitchFill').style.height = h + '%';
    document.getElementById('pitchFill2').style.height = h + '%';
  }, 150);
}
function stopPitchSim() {
  if (pitchInterval) { clearInterval(pitchInterval); pitchInterval = null; }
  document.getElementById('pitchFill').style.height = '10%';
  document.getElementById('pitchFill2').style.height = '10%';
}

function updateTimerRing(dur, el) {
  const remaining = Math.max(0, dur - el);
  const pct = remaining / dur;
  const circ = 125.6;
  document.getElementById('timerRing').style.strokeDashoffset = circ * (1 - pct);
  document.getElementById('timerText').textContent = Math.ceil(remaining);
}

async function toggleMic() {
  if (isMicOn && micAvailable) {
    stopMic();
    isMicOn = false;
    micAvailable = false;
    document.getElementById('micBtn').textContent = '🔇';
    document.getElementById('micBtn').classList.add('muted');
    startPitchSim();
  } else {
    stopPitchSim();
    document.getElementById('bars').classList.remove('paused');
    await startMic();
  }
}

function restartSong() {
  if (gameTimer) clearInterval(gameTimer);
  ytStop();
  stopMic();
  stopPitchSim();
  resetGame();
  renderLyric();
  if (currentSong && currentSong.ytId) ytLoad(currentSong.ytId, currentSong.ytStart || 0);
}

function endGame() {
  if (gameTimer) clearInterval(gameTimer);
  ytStop();
  stopMic();
  stopPitchSim();
  isPlaying = false;
  showResult();
}

// ============ RESULT ============
function showResult() {
  const pct = score / 3000;
  let grade, msg, stars;
  if (pct > 0.9) { grade = 'S+'; stars = '⭐⭐⭐⭐⭐'; msg = '🔥 Você é uma estrela! Sensacional!'; }
  else if (pct > 0.75) { grade = 'A+'; stars = '⭐⭐⭐⭐⭐'; msg = '🎤 Incrível! Você arrasou!'; }
  else if (pct > 0.6) { grade = 'A'; stars = '⭐⭐⭐⭐'; msg = '🌟 Muito bom! Continue assim!'; }
  else if (pct > 0.4) { grade = 'B'; stars = '⭐⭐⭐'; msg = '👏 Bom desempenho! Pratique mais!'; }
  else if (pct > 0.2) { grade = 'C'; stars = '⭐⭐'; msg = '💪 Não desista! Pode melhorar!'; }
  else { grade = 'D'; stars = '⭐'; msg = '🎵 Continue praticando!'; }

  document.getElementById('resultGrade').textContent = grade;
  document.getElementById('resultStars').textContent = stars;
  document.getElementById('resultScore').textContent = score + ' pts';
  document.getElementById('resultMsg').textContent = msg;

  showScreen('result');

  if (pct > 0.5) spawnFireworks();
}

function spawnFireworks() {
  const colors = ['#ff2d78', '#00f5ff', '#ffe600', '#bf00ff', '#fff'];
  for (let burst = 0; burst < 5; burst++) {
    setTimeout(() => {
      const cx = 20 + Math.random() * 60;
      const cy = 20 + Math.random() * 60;
      for (let i = 0; i < 12; i++) {
        const fw = document.createElement('div');
        fw.className = 'firework';
        fw.style.left = cx + 'vw';
        fw.style.top = cy + 'vh';
        fw.style.background = colors[Math.floor(Math.random() * colors.length)];
        const angle = (i / 12) * 2 * Math.PI;
        const dist = 40 + Math.random() * 60;
        fw.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
        fw.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
        document.body.appendChild(fw);
        setTimeout(() => fw.remove(), 1000);
      }
    }, burst * 400);
  }
}

function restartFromResult() {
  resetGame();
  renderLyric();
  showScreen('game');
  if (currentSong && currentSong.ytId) ytLoad(currentSong.ytId, currentSong.ytStart || 0);
}

// ============ COUNTDOWN ============
function startCountdown(cb) {
  const el = document.getElementById('countdown');
  const num = document.getElementById('countdownNum');
  el.style.display = 'flex';
  let n = 3;
  num.textContent = n;

  const cd = setInterval(() => {
    n--;
    if (n <= 0) {
      clearInterval(cd);
      el.style.display = 'none';
      cb();
    } else {
      num.textContent = n;
      num.style.animation = 'none';
      void num.offsetWidth;
      num.style.animation = 'cdPop 1s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
    }
  }, 1000);
}

// ============ NAVIGATION ============
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.style.display = 'none';
  });
  const el = document.getElementById(id);
  el.style.display = 'flex';
  el.classList.add('active');
}

function goToMenu() {
  if (gameTimer) clearInterval(gameTimer);
  ytStop();
  stopMic();
  stopPitchSim();
  resetGame();
  showScreen('menu');
}

// ============ INIT ============
renderSongs(SONGS);
showScreen('menu');
</script>
